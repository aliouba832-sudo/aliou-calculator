<!DOCTYPE html>
<html lang="fr">
<head>
  <meta name="google-site-verification" content="kJo_QEh06GE3_Xzw83alNO7djLprdCtlvgrPCV1XN3I"/>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <link rel="stylesheet" href="style.css">
  <title>Calculateur d'Âge | Aliou Ba</title>
  <meta name="description" content="Le super calculateur d'âge d'Aliou, futur expert en génie logiciel au Sénégal.">
  <meta name="keywords" content="Aliou, Calculateur, Sénégal, Génie Logiciel">
</head>
<body>

    <header class="main-header">
        <div class="container">
            <h1>Aliou <span class="highlight">Tech</span></h1>
            <nav>
                <a href="#">Accueil</a>
                <a href="#projets">Projets</a>
            </nav>
        </div>
    </header>

    <main class="content">
        <div class="calculator-card">
            <h1>Le Calculateur d'Aliou</h1>

            <p>Quelle est ton année de naissance ?</p>
            <input type="number" id="boite_annee" placeholder="Ex: 2003">

            <button onclick="calculer()">Voir mon âge en 2026</button>

            <h2 id="zone_resultat"></h2>
        </div>
    </main>

    <footer class="main-footer">
        <div class="container">
            <p>&copy; 2026 Aliou Ba | Développeur Logiciel - Sénégal</p>
            <small>Objectif : Excellence & 10 Millions FCFA</small>
        </div>
    </footer>

    <script>
        function calculer() {
            let annee = document.getElementById("boite_annee").value;
            let resultat = document.getElementById("zone_resultat");
            
            if (!annee) {
                resultat.textContent = "Choisis une année d'abord ! 😊";
                resultat.style.color = "#fbbf24"; 
                return;
            }

            let age = 2026 - annee;

            if (isNaN(age)) {
                resultat.textContent = "Hé, ce n'est pas une année valide ! 🧐";
                resultat.style.color = "#fbbf24";
                return;
            }

            if (annee < 1900) {
                resultat.textContent = "Oula, tu es un voyageur du temps ? 🚀";
                resultat.style.color = "#fbbf24";
            }
            else if (annee > 2026) {
                resultat.textContent = "Attends... tu n'es pas encore né ! 🤔";
                resultat.style.color = "#fbbf24";
            } 
            else if (age < 18) {
                resultat.textContent = "Tu as " + age + " ans, tu es encore mineur ! 😎";
                resultat.style.color = "#f87171";
            }
            else if (age > 100) {
                resultat.textContent = "Wow, " + age + " ans ? Respect, doyen ! 👴";
                resultat.style.color = "#c084fc";
            } 
            else {
                resultat.textContent = "Tu as " + age + " ans en 2026. ✅";
                resultat.style.color = "#4ade80";
            }
        }
    </script>
</body>
</html>
